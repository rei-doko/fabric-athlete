<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Fabric Athlete</title>
        <link rel="stylesheet" href="static/style.css">
		<link href="static/bootstrap.min.css" rel="stylesheet"><!--bootstrap part, dont touch pls... big headache...-->
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="user.html">User</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
			<div class="logo-wrapper">
                <a href="index.html">
					<img src="static/img/logo.png" alt="logo">
				</a>
            </div>
        </header>

        <main class="container my-5">
            <section>
                <div class="user-wrapper row">
	<!--SIDEBAR-->
                    <div class="settings-menu-wrapper col-12 col-md-3 mb-4">
						<div class="p-3 rounded">
							<h2> User Profile </h2><br>
							<ul class="list-unstyled">
								<li class="mb-2"><button class="tab-btn" data-target="theme">Theme Settings</button></li>
								<li class="mb-2"><button class="tab-btn" data-target="billing">Billing Options</button></li>
								<li class="mb-2"><button class="tab-btn" data-target="info">Account Information</button></li>
								<li class="mb-2"><button class="tab-btn" data-target="logout">Logout</button></li>
							</ul>
						</div>
					</div>
	<!--SETTINGS-->
					<div class="col-12 col-md-9">	
						<div class="p-4 rounded shadow-sm">
			<!--THEME-->
							<div class="settings-wrapper active" id="theme">
								<div>
									<h3> Theme Settings </h3>
									<div class ="input-group">
										<input type="checkbox" id="light">
										<label for="light"> Light </label>
									</div>
									<div class ="input-group">
										<input type="checkbox" id="dark">
										<label for="dark"> Dark </label>
									</div>
								</div>
							</div>
			<!--BILLING-->
							<div class="settings-wrapper" id="billing">
								<div>
									<h3> Billing Options </h3>
									<div class="row">
										<div class="col-12 mb-3">
											<input class="form-control" type="text" id="card-info" placeholder="**** **** **** ****">
											<label class="form-label" for="card-info"> Card Information </label>
										</div>
										<div class="col-12 mb-3">
											<input class="form-control" type="text" id="expiry" placeholder="MM/YYYY">
											<label class="form-label" for="expiry"> Expiry Date </label>
										</div>
										<div class="col-12 mb-3">
											<input class="form-control" type="text" id="cvc" placeholder="***">
											<label class="form-label" for="cvc"> CVC </label>
										</div>
									</div>
								</div>	
							</div>
			<!--ACCOUNT-->
							<div class="settings-wrapper" id="info">
								<div>
									<h3> Account Information </h3>
									<div class="row">
										<div class="col-md-6 mb-3">
											<input class="form-control" type="text" id="first-name">
											<label class="form-label" for="first-name"> First Name </label>
										</div>
										<div class="col-md-6 mb-3">
											<input class="form-control" type="text" id="last-name">
											<label class="form-label" for="last-name"> Last Name </label>
										</div>
										<div class="col-md-6 mb-3">
											<input class="form-control" type="tel" id="contact-num">
											<label class="form-label" for="contact-num"> Contact Number </label>
										</div>
										<div class="col-md-6 mb-3">
											<input class="form-control" type="text" id="address">
											<label class="form-label" for="address"> Address </label>
										</div>
										<div class="col-md-6 mb-3">
											<input class="form-control" type="email" id="email">
											<label class="form-label" for="email"> Email Address </label>
										</div>
										<div class="col-md-6 mb-3">
											<input class="form-control" type="password" id="password">
											<label class="form-label" for="password"> Password </label>
										</div>
									</div>
								</div>
							</div>
		<!--LOGOUT-->
							<div class="settings-wrapper" id="logout">
								<div>
									<h3>Logout</h3><br>
									<button class="btn btn-danger">Logout</button>
								</div>
							</div>
						</div>
					</div>
				</div>
            </section>
        </main>

        <footer>
            <div>
                <small>2026 Fabric Athletes. All rights reserved.</small>
            </div>
            <div>
                <small>Contact Us:</small>
                <small>Email: info@fabricathlete.com</small>
                <small>Tel. No: 123-456-7890</small>
            </div>
        </footer>
		<script src="script/script.js"></script>
    </body>
</html>
